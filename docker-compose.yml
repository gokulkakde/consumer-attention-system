version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: consumer-attention-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: consumer_attention_db
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  mongodb:
    image: mongo:6.0
    container_name: consumer-attention-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: consumer_attention_mongodb
    volumes:
      - ./mongodata:/data/db
